apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-internal-monitor
  namespace: signoz
  labels:
    app: otel-internal-monitor
spec:
  mode: deployment
  image: signoz/signoz-otel-collector:v0.144.5
  serviceAccount: signoz-signoz-helm-otel-collector
  config:
    receivers:
      httpcheck:
        metrics:
          httpcheck.dns.lookup.duration:
            enabled: true
          httpcheck.client.connection.duration:
            enabled: true
          httpcheck.tls.handshake.duration:
            enabled: true
          httpcheck.client.request.duration:
            enabled: true
          httpcheck.response.duration:
            enabled: true
          httpcheck.tls.cert_remaining:
            enabled: true
        targets:
          - endpoint: https://grafana.mvaldes.dev
            method: GET
          - endpoint: https://blog.mvaldes.dev/en
            method: GET
          - endpoint: https://mvaldes.dev
            method: GET
          - endpoint: https://umami.mvaldes.dev
            method: GET
          - endpoint: https://vault.mvaldes.dev
            method: GET
          - endpoint: https://paperless.mvaldes.dev
            method: GET
          - endpoint: https://db.mvaldes.dev
            method: GET
          - endpoint: https://automate.mvaldes.dev
            method: GET
          - endpoint: https://gotify.mvaldes.dev
            method: GET
          - endpoint: https://signoz.mvaldes.dev
            method: GET
          - endpoint: https://radarr.int.mvaldes.dev
            method: GET
          - endpoint: https://sonarr.int.mvaldes.dev
            method: GET
          - endpoint: https://prowlarr.int.mvaldes.dev
            method: GET
          - endpoint: https://readarr.int.mvaldes.dev
            method: GET
          - endpoint: https://authentik.int.mvaldes.dev
            method: GET
          - endpoint: https://s3ui.int.mvaldes.dev
            method: GET
          - endpoint: https://hoa.int.mvaldes.dev
            method: GET
        collection_interval: 30s

      prometheus:
        config:
          scrape_configs:
            # Scrape pods with prometheus.io/* annotations (standard)
            - job_name: k8s-pods-prometheus
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels:
                    [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels:
                    [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels:
                    [
                      __address__,
                      __meta_kubernetes_pod_annotation_prometheus_io_port,
                    ]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__

            # Scrape Hubble metrics (9965) — same pod as cilium-agent, so the
            # single prometheus.io/port annotation can't cover it. Target the
            # hubble-metrics headless service endpoints directly instead.
            - job_name: cilium-hubble
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_namespace
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
                  action: keep
                  regex: kube-system;hubble-metrics;hubble-metrics

            # Scrape pods with signoz.io/* annotations (SigNoz components)
            - job_name: k8s-pods-signoz
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels:
                    [__meta_kubernetes_pod_annotation_signoz_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels:
                    [__meta_kubernetes_pod_annotation_signoz_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels:
                    [
                      __address__,
                      __meta_kubernetes_pod_annotation_signoz_io_port,
                    ]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__

    processors:
      batch:
        timeout: 10s
        send_batch_size: 100

      resource:
        attributes:
          - key: service.name
            value: site-monitoring
            action: insert
          - key: deployment.environment
            value: homelab
            action: insert

    exporters:
      otlp:
        endpoint: "signoz-signoz-helm-otel-collector:4317"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [httpcheck, prometheus]
          processors: [resource, batch]
          exporters: [otlp]

      telemetry:
        logs:
          level: info
---
# Additive RBAC for this collector (SA: signoz-signoz-helm-otel-collector).
# The cilium-hubble scrape job above uses kubernetes_sd role: endpoints
# (Hubble's :9965 shares the cilium-agent pod, so a single prometheus.io/port annotation
# can't reach it). The Helm-managed collector ClusterRole only covers role: pod discovery,
# so endpoint discovery is forbidden. This grant is kept separate from the Helm chart so it
# is not reverted on reconcile.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-monitor-endpoints-reader
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-monitor-endpoints-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-monitor-endpoints-reader
subjects:
  - kind: ServiceAccount
    name: signoz-signoz-helm-otel-collector
    namespace: signoz
