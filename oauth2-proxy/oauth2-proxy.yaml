apiVersion: v1
kind: Namespace
metadata:
  name: oauth2-proxy
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: oauth2-proxy-helm
  namespace: oauth2-proxy
spec:
  interval: 1h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: oauth2-proxy-release
  namespace: oauth2-proxy
spec:
  targetNamespace: oauth2-proxy
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.3"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy-helm
  values:
    config:
      clientID: "oauth2-proxy"
      existingSecret: "oauth2-proxy-secrets"
    extraArgs:
      provider: keycloak-oidc
      oidc-issuer-url: "http://keycloak.local.net/realms/homelab"
      redirect-url: "http://auth.local.net/oauth2/callback"
      email-domain: "*"
      upstream: "file:///dev/null"
      cookie-domain: ".local.net"
      cookie-secure: "true"
      cookie-refresh: "1m"
      cookie-expire: "30m"
      pass-authorization-header: "true"
      set-authorization-header: "true"
      pass-access-token: "true"
      skip-provider-button: "true"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - auth.local.net
      path: /oauth2
      pathType: Prefix
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
