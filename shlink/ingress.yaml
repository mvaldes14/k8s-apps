apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: shlink-ingressroute
  namespace: shlink
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    - kind: Rule
      match: Host(`links.int.mvaldes.dev`)
      middlewares:
        - name: oauth2-proxy
          namespace: oauth2-proxy
        - name: oauth2-errors
          namespace: oauth2-proxy
      services:
        - name: shlink-svc-web
          port: 80
