apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wger-secret
  namespace: wger
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-store-apps
  refreshPolicy: Periodic
  refreshInterval: 10m
  dataFrom:
    - extract:
        key: apps/wger
  target:
    name: wger-secret
    creationPolicy: Owner
    deletionPolicy: Delete
