apiVersion: v1
kind: Namespace
metadata:
  name: td
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: td-deploy
  namespace: td
spec:
  replicas: 1
  selector:
    matchLabels:
      app: td-deploy
  template:
    metadata:
      labels:
        app: td-deploy
    spec:
      containers:
        - name: td
          image: ghcr.io/mvaldes14/task-manager:latest
          ports:
            - name: td-port
              containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: POSTGRES_URL
            - name: TD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_USERNAME
            - name: TD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_PASSWORD
            - name: TD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_API_KEY
            - name: GCAL_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: GCAL_CREDENTIALS_JSON
            - name: GCAL_CALENDAR_ID
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: GCAL_CALENDAR_ID
            - name: OBSIDIAN_VAULT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OBSIDIAN_VAULT
            - name: OBSIDIAN_INBOX
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OBSIDIAN_INBOX
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: VITE_OTEL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: VITE_OTEL_ENDPOINT
          readinessProbe:
            httpGet:
              path: /auth/status
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: td-deploy-mcp
  namespace: td
spec:
  replicas: 1
  selector:
    matchLabels:
      app: td-deploy-mcp
  template:
    metadata:
      labels:
        app: td-deploy-mcp
    spec:
      containers:
        - name: td
          image: ghcr.io/mvaldes14/task-manager-mcp:latest
          ports:
            - name: td-port-mcp
              containerPort: 8080
          env:
            - name: MCP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: MCP_BASE_URL
            - name: DOIT_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: DOIT_BASE_URL
            - name: DOIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: DOIT_API_KEY
