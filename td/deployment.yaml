apiVersion: v1
kind: Namespace
metadata:
  name: td
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: td-deploy
  namespace: td
spec:
  replicas: 1
  selector:
    matchLabels:
      app: td-deploy
  template:
    metadata:
      labels:
        app: td-deploy
    spec:
      containers:
        - name: td
          image: ghcr.io/mvaldes14/task-manager:20260310-195248@sha256:1f0f4a928ac8e3fe7d5ddc7239a400275b80a29d548d60e66bde0c978b4036f3 # {"$imagepolicy" : "flux-system:td-policy"}
          ports:
            - name: td-port
              containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: POSTGRES_URL
            - name: TD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_USERNAME
            - name: TD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_PASSWORD
            - name: TD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: TD_API_KEY
            - name: GCAL_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: GCAL_CREDENTIALS_JSON
            - name: GCAL_CALENDAR_ID
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: GCAL_CALENDAR_ID
            - name: OBSIDIAN_VAULT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OBSIDIAN_VAULT
            - name: OBSIDIAN_INBOX
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OBSIDIAN_INBOX
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: VITE_OTEL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: td-secret
                  key: VITE_OTEL_ENDPOINT
          readinessProbe:
            httpGet:
              path: /auth/status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
