apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-k8s
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.14.0.21
  share: /share/k8s
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - soft
  - nfsvers=3
  - nolock
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-k8s-keep
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.14.0.21
  share: /share/k8s
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - soft
  - nfsvers=3
  - nolock
