apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  values.yaml: |
    global:
      domain: argo.mvaldes.dev
    # ---------------------------------------------------------------------------
    # Core config
    # ---------------------------------------------------------------------------
    configs:
      cm:
        users.anonymous.enabled: "false"
      params:
        server.insecure: true  # TLS terminated at Cloudflare
      secret:
        createSecret: false    # ESO owns argocd-secret
    # ---------------------------------------------------------------------------
    # Disable bundled Redis
    # ---------------------------------------------------------------------------
    redis:
      enabled: false
    redis-ha:
      enabled: false
    externalRedis:
      host: redis-svc.db
      port: 6379
    # ---------------------------------------------------------------------------
    # Disable Dex
    # ---------------------------------------------------------------------------
    dex:
      enabled: false
    # ---------------------------------------------------------------------------
    # Single-replica components
    # ---------------------------------------------------------------------------
    controller:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    server:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

      # No ingress — cloudflared points directly at the ClusterIP service
      ingress:
        enabled: false

      service:
        type: ClusterIP
        servicePortHttp: 80
        servicePortHttps: 443

    repoServer:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

    applicationSet:
      replicas: 1
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    notifications:
      enabled: true
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
