apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: argocd
  namespace: flux-system
spec:
  interval: 12h
  url: https://argoproj.github.io/argo-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 1h
  chart:
    spec:
      chart: argo-cd
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: argocd
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: argocd-cm
      valuesKey: values.yaml
