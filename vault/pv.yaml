apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 5Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: data-vault-vault-release-0
    namespace: vault
  csi:
    driver: nfs.csi.k8s.io
    volumeAttributes:
      csi.storage.k8s.io/pv/name: vault
      csi.storage.k8s.io/pvc/name: data-vault-vault-release-0
      csi.storage.k8s.io/pvc/namespace: vault
      server: 10.14.0.21
      share: /share/k8s/vault
      storage.kubernetes.io/csiProvisionerIdentity: 1757349754008-3337-nfs.csi.k8s.io
    volumeHandle: 10.14.0.21#share/k8s/vault##
  mountOptions:
    - soft
    - nfsvers=3
    - nolock
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-k8s-keep
  volumeMode: Filesystem
